<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Neutral Advisory</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the full path in sessionStorage then redirects to the root
      var segmentCount = 1; // number of path segments in the repo name (/na = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
